name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. v0.1.0"
        required: true
permissions:
  contents: read
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/fromforgesoftware/talos
      CHART_REPO: oci://ghcr.io/fromforgesoftware/charts
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then RAW="${{ github.event.release.tag_name }}"; else RAW="${{ inputs.version }}"; fi
          echo "ver=${RAW#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.v.outputs.ver }}
      - uses: azure/setup-helm@v4
      - name: Package + push Helm chart
        run: |
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          helm package deploy/helm --version "${{ steps.v.outputs.ver }}" --app-version "${{ steps.v.outputs.ver }}"
          helm push *-${{ steps.v.outputs.ver }}.tgz ${{ env.CHART_REPO }}
