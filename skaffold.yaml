apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: talos

# Local dev only. `skaffold dev` builds the image and deploys it via Helm
# to a local cluster. Prod is deployed by the release pipeline using the
# published OCI chart + image (see deploy/helm/envs/prod/values.yaml).
profiles:
  - name: local
    activation:
      - command: dev
    build:
      artifacts:
        - image: forge/talos
          # Standalone repo: the module is at the repo root and consumes the
          # published go-kit pinned in go.mod (no replace), so the build context
          # is this repo and the Dockerfile sits at its root.
          context: .
          docker:
            dockerfile: Dockerfile
    manifests:
      helm:
        releases:
          - name: talos
            chartPath: deploy/helm
            valuesFiles:
              - deploy/helm/envs/local/values.yaml
            setValueTemplates:
              image.repository: '{{.IMAGE_REPO_forge_talos}}'
              image.tag: '{{.IMAGE_TAG_forge_talos}}@{{.IMAGE_DIGEST_forge_talos}}'
    deploy:
      helm: {}
