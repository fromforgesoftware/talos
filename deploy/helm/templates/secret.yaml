{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "talos.dbSecretName" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "talos.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ .Values.database.username | quote }}
  DB_PASSWORD: {{ .Values.database.password | quote }}
{{- end }}
{{- if .Values.streamHmacSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "talos.fullname" . }}-stream
  labels:
    {{- include "talos.labels" . | nindent 4 }}
type: Opaque
stringData:
  TALOS_STREAM_HMAC_SECRET: {{ .Values.streamHmacSecret | quote }}
{{- end }}
