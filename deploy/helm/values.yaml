# Default values for the Talos chart.
nameOverride: ''
fullnameOverride: ''

replicaCount: 3

image:
  repository: ghcr.io/fromforgesoftware/talos
  pullPolicy: IfNotPresent
  tag: '' # defaults to .Chart.AppVersion

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ''

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

# Ports: REST/OpenAPI + gRPC.
ports:
  http: 8080
  grpc: 9090

service:
  type: ClusterIP
  httpPort: 80
  grpcPort: 9090

# Database connection. Talos owns its own schema (search_path) inside the
# target Postgres; consumers sharing a Postgres MUST use distinct schemas.
database:
  host: ''
  port: '5432'
  name: ''
  schema: talos
  ssl: require
  # Credentials: reference an existing secret with keys DB_USER/DB_PASSWORD,
  # or set username/password to have the chart create one.
  existingSecret: ''
  username: ''
  password: ''

# Pre-install / pre-upgrade migration job (runs /app/migrator).
migrationJob:
  enabled: true
  backoffLimit: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: '1'
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

# Shared HMAC secret gating /api admin routes to the Foundry gateway
# (empty = open). Must match across Foundry and the products it manages.
gatewaySecret: ''

# How many months of audit events to retain. The retention sweeper drops
# partitions older than this; 0 disables retention.
retentionMonths: 6

# Shared HMAC secret signing WebSocket live-tail bearer tokens. When set, the
# chart creates a <fullname>-stream secret and the server requires a valid
# HMAC JWT to open /api/audit-events/stream. Empty = stream auth disabled.
streamHmacSecret: ''

# Comma-separated list of origins allowed to open the live-tail WebSocket
# (cross-site WS hijacking guard). Empty = allow all (dev default).
wsAllowedOrigins: ''
